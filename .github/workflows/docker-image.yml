name: Docker Image CI

on:
  workflow_dispatch:

jobs:
  build:
    # Native arm64 runner -> builds arm64 without QEMU, and plain `docker build`
    # produces a classic Docker-format image that HA Supervisor can extract.
    # (buildx + gha cache produced OCI layers that broke with
    #  "archive/tar: invalid tar header" on the Supervisor's older moby.)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        run: |
          IMG=ghcr.io/razormeister/handgesturerecognition
          docker build -t $IMG:1.4.1 -t $IMG:latest .
          docker push $IMG:1.4.1
          docker push $IMG:latest
